name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          static_site_generator: next
          
      - name: Install dependencies
        run: npm install

      - name: Build with Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""

      # ТОВА Е КЛЮЧЪТ: Проверяваме къде са файловете и ги местим, ако трябва
      - name: Ensure out directory exists
        run: |
          if [ -d "out" ]; then
            echo "Directory 'out' exists."
          elif [ -d ".next" ]; then
            echo "Directory 'out' missing, but '.next' found. Forcing export..."
            npx next export || echo "Manual export failed, checking config..."
          else
            echo "Neither 'out' nor '.next' found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
